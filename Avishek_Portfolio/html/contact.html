<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Avishek</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="educations.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Contact Me</h2>
            <p>Please fill out the form below to get in touch regarding projects, thesis collaborations, or job opportunities.</p>
            <br>
            
            <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 15px; max-width: 500px;">
                
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="firstname" required style="padding: 8px;">

                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lastname" required style="padding: 8px;">

                <fieldset style="padding: 10px; border: 1px solid #ccc;">
                    <legend>Gender:</legend>
                    <input type="radio" id="male" name="gender" value="Male">
                    <label for="male" style="margin-right: 15px;">Male</label>
                    
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female" style="margin-right: 15px;">Female</label>
                    
                    <input type="radio" id="others" name="gender" value="Others">
                    <label for="others">Others</label>
                </fieldset>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required style="padding: 8px;">

                <label for="company">Company:</label>
                <input type="text" id="company" name="company" style="padding: 8px;">

                <fieldset style="padding: 10px; border: 1px solid #ccc;">
                    <legend>Reason of Contact:</legend>
                    <div style="margin-bottom: 5px;">
                        <input type="radio" id="reason-projects" name="reason" value="Projects" required>
                        <label for="reason-projects">Projects</label>
                    </div>
                    <div style="margin-bottom: 5px;">
                        <input type="radio" id="reason-thesis" name="reason" value="Thesis" required>
                        <label for="reason-thesis">Thesis</label>
                    </div>
                    <div>
                        <input type="radio" id="reason-job" name="reason" value="Job" required>
                        <label for="reason-job">Job</label>
                    </div>
                </fieldset>

                <fieldset style="padding: 10px; border: 1px solid #ccc;">
                    <legend>Topics:</legend>
                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="topic-web" name="topics" value="Web Development">
                        <label for="topic-web">Web Development</label>
                    </div>
                    <div style="margin-bottom: 5px;">
                        <input type="checkbox" id="topic-mobile" name="topics" value="Mobile Development">
                        <label for="topic-mobile">Mobile Development</label>
                    </div>
                    <div>
                        <input type="checkbox" id="topic-ai" name="topics" value="AI/ML Development">
                        <label for="topic-ai">AI/ML Development</label>
                    </div>
                </fieldset>

                <label for="date">Consultation Date:</label>
                <input type="date" id="date" name="consultation_date" required style="padding: 8px;">

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" style="padding: 10px 20px; background-color: #2c3e50; color: white; border: none; cursor: pointer; flex: 1;">Submit</button>
                    <button type="reset" style="padding: 10px 20px; background-color: #e74c3c; color: white; border: none; cursor: pointer; flex: 1;">Reset</button>
                </div>

            </form>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://github.com/AvishekBiswas99" target="_blank">
                <img src="../images/Git.png" alt="GitHub" class="social-icon">
            </a>
            <a href="https://www.linkedin.com/in/avishek-biswas-ab5t4/" target="_blank">
                <img src="../images/in.png" alt="LinkedIn" class="social-icon">
            </a>
        </div>
        <p>&copy; 2026 Avishek. All rights reserved.</p>
    </footer>

</body>
</html>
